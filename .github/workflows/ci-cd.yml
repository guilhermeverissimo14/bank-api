name: CI/CD

# Roda em todo push na main e em todo pull request que tenha a main como destino
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Runner do GitHub já vem com Docker instalado e rodando precisa por causa do Testcontainers
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRATION_MINUTES: 120

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build e testes
        # "verify" já cobre tudo: compila, roda os testes unitários (Surefire),
        # empacota o JAR, e roda os testes de integração (Failsafe)
        run: ./mvnw clean verify

  publish:
    # Só roda depois que o job "build" (testes) terminar com SUCESSO —
    # garante que nunca publicamos uma imagem que não passou nos testes
    needs: build
    runs-on: ubuntu-latest
    # Só publica em push direto na main, não em todo pull request
    # (senão geraria imagem nova a cada PR aberto, sem necessidade)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bank-api:latest
