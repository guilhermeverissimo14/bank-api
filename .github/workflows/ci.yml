name: CI

# Roda em todo push na main e em todo pull request que tenha a main como destino
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Runner do GitHub já vem com Docker instalado e rodando Precisa por causa do Testcontainers
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRATION_MINUTES: 120

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build e testes
        # "verify" já cobre tudo: compila, roda os testes unitários (Surefire),
        # empacota o JAR, e roda os testes de integração (Failsafe)
        run: ./mvnw clean verify
