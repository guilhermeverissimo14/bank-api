spring.application.name=bank-api

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:bankapi}
spring.datasource.username=${POSTGRES_USER:bankapi}
spring.datasource.password=${POSTGRES_PASSWORD:bankapi}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
